[tool.ruff]
target-version = "py313"
line-length = 120
exclude = [
  ".git",
  ".venv",
  "__pycache__",
  "client/frontend/node_modules",
  "client/android/.gradle",
  "client/android/app/build",
  "client/dist",
  "client/build/kabootar-client",
  "client/vendor",
]

[tool.ruff.lint]
extend-select = ["I"]
