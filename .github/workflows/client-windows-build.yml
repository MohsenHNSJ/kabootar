name: Kabootar Windows Build

on:
  push:
    paths:
      - "client/**"
      - "version.properties"
      - ".github/workflows/client-windows-build.yml"
  pull_request:
    paths:
      - "client/**"
      - "version.properties"
      - ".github/workflows/client-windows-build.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs: {}

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x86
            runner: windows-latest
            python_arch: x86
            asset_name: kabootar-windows-x86.exe
            artifact_name: kabootar-windows-x86
          - label: x64
            runner: windows-latest
            python_arch: x64
            asset_name: kabootar-windows-x64.exe
            artifact_name: kabootar-windows-x64
          - label: arm64
            runner: windows-11-arm
            python_arch: arm64
            asset_name: kabootar-windows-arm64.exe
            artifact_name: kabootar-windows-arm64
    defaults:
      run:
        shell: powershell
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.python_arch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/frontend/package-lock.json

      - name: Prepare Kabootar Logo Assets
        run: |
          python -m pip install Pillow cairosvg
          python build\assets\prepare_logo_assets.py

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          if ($LASTEXITCODE -ne 0) {
            Write-Host "requirements.txt install failed, falling back to core dependencies"
            python -m pip install Flask==3.0.3 SQLAlchemy==2.0.36 alembic==1.14.1 python-dotenv==1.0.1 requests==2.32.3 PySocks==1.7.1 feedparser==6.0.11 dnslib==0.9.25 dnspython==2.6.1
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m pip install pywebview pyinstaller
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Frontend
        shell: cmd
        run: |
          pushd frontend
          npm ci
          if errorlevel 1 exit /b 1
          npm run build
          if errorlevel 1 exit /b 1
          popd

      - name: Build Desktop EXE (${{ matrix.label }})
        run: |
          $args = @(
            "--noconfirm"
            "--clean"
            "--onefile"
            "--windowed"
            "--name", "kabootar"
            "--icon", "build\windows\kabootar.ico"
            "--add-data", "..\version.properties;."
            "--add-data", "frontend\templates;frontend\templates"
            "--add-data", "frontend\static;frontend\static"
            "--add-data", "alembic;alembic"
            "desktop_client.py"
          )
          python -m PyInstaller @args
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Prepare Release Asset (${{ matrix.label }})
        if: github.event_name == 'release'
        run: Copy-Item dist\kabootar.exe "dist\${{ matrix.asset_name }}" -Force

      - name: Upload Artifact (${{ matrix.label }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: client/dist/kabootar.exe
          if-no-files-found: error

      - name: Publish Release Asset (${{ matrix.label }})
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: client/dist/${{ matrix.asset_name }}
